<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Oyunu - Yağız Oyun</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            background: #1a1a1a;
            display: block;
            margin: 20px auto;
            border: 3px solid white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: white;
            margin-top: 0;
        }
        .info {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .instructions {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Oyunu</h1>
        <div class="instructions">Ok tuşlarını kullanarak yılanı kontrol et!</div>
        <div class="info">Skor: <span id="score">0</span> | Uzunluk: <span id="length">3</span></div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <br>
        <button class="btn" onclick="location.href='../index.html'">Geri Dön</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        
        let food = {x: 15, y: 10};
        let dx = 1, dy = 0;
        let nextDx = 1, nextDy = 0;
        let score = 0;
        let gameOver = false;
        
        function update() {
            if (gameOver) return;
            
            dx = nextDx;
            dy = nextDy;
            
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver = true;
                return;
            }
            
            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver = true;
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                document.getElementById('length').textContent = snake.length;
                
                // Generate new food
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Snake
            ctx.fillStyle = '#00FF00';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(
                    snake[i].x * gridSize,
                    snake[i].y * gridSize,
                    gridSize - 2,
                    gridSize - 2
                );
            }
            
            // Food
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(
                food.x * gridSize,
                food.y * gridSize,
                gridSize - 2,
                gridSize - 2
            );
            
            // Game over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial';
                ctx.fillText('Skor: ' + score, canvas.width / 2, canvas.height / 2 + 20);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowUp':
                    if (dy === 0) nextDy = -1, nextDx = 0;
                    break;
                case 'ArrowDown':
                    if (dy === 0) nextDy = 1, nextDx = 0;
                    break;
                case 'ArrowLeft':
                    if (dx === 0) nextDx = -1, nextDy = 0;
                    break;
                case 'ArrowRight':
                    if (dx === 0) nextDx = 1, nextDy = 0;
                    break;
            }
            e.preventDefault();
        });
        
        gameLoop();
    </script>
</body>
</html>
