<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zar Atma Oyunu - Yağız Oyun</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .game-area {
            margin: 30px 0;
        }
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .dice {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .score-area {
            margin: 20px 0;
        }
        .score {
            font-size: 18px;
            margin: 10px 0;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .btn-reset {
            background-color: #ff6b6b;
        }
        .btn-reset:hover {
            background-color: #ff5252;
        }
        .btn-back {
            background-color: #008CBA;
        }
        .btn-back:hover {
            background-color: #007399;
        }
        .result {
            font-size: 18px;
            margin: 20px 0;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Zar Atma Oyunu</h1>
        
        <div class="game-area">
            <div class="dice-container">
                <div>
                    <h3>Senin Zarın</h3>
                    <div class="dice" id="playerDice">🎲</div>
                </div>
                <div>
                    <h3>Bilgisayarın Zarı</h3>
                    <div class="dice" id="computerDice">🎲</div>
                </div>
            </div>
            
            <div class="result" id="result"></div>
            
            <div class="score-area">
                <div class="score">Senin Skorun: <strong id="playerScore">0</strong></div>
                <div class="score">Bilgisayarın Skoru: <strong id="computerScore">0</strong></div>
            </div>
            
            <button class="btn" onclick="playGame()">Zar At (Oyna)</button>
            <button class="btn btn-reset" onclick="resetGame()">Yeniden Başla</button>
            <button class="btn btn-back" onclick="location.href='../index.html'">Geri Dön</button>
        </div>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        
        function playGame() {
            const playerDice = Math.floor(Math.random() * 6) + 1;
            const computerDice = Math.floor(Math.random() * 6) + 1;
            
            const playerDiceElement = document.getElementById('playerDice');
            const computerDiceElement = document.getElementById('computerDice');
            const resultElement = document.getElementById('result');
            
            // Animate
            playerDiceElement.style.transform = 'rotate(360deg)';
            computerDiceElement.style.transform = 'rotate(360deg)';
            
            playerDiceElement.textContent = playerDice;
            computerDiceElement.textContent = computerDice;
            
            let result = '';
            if (playerDice > computerDice) {
                result = '🎉 Kazandın!';
                playerScore++;
            } else if (computerDice > playerDice) {
                result = '😔 Bilgisayar Kazandı!';
                computerScore++;
            } else {
                result = '🤝 Berabere!';
            }
            
            resultElement.textContent = result + ` (${playerDice} vs ${computerDice})`;
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }
        
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('playerDice').textContent = '🎲';
            document.getElementById('computerDice').textContent = '🎲';
            document.getElementById('result').textContent = '';
        }
    </script>
</body>
</html>
