<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yağız Dash - Ana Sayfa</title>
    <style>
        /* SİTE VE OYUN TASARIMI */
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { background: #020208; font-family: sans-serif; color: #fff; overflow: hidden; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#020208; z-index:10; }
        .hidden { display: none !important; }
        h1 { color: #00f2ff; font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }
        .btn { background: #00f2ff; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="mainMenu" class="screen">
        <h1>YAĞIZ DASH</h1>
        <button class="btn" onclick="startGame()">OYUNA GİR</button>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("mainMenu");
        
        let inGame = false;
        let player = { x: 100, y: 300, dy: 0, size: 40 };

        function startGame() {
            menu.classList.add("hidden");
            canvas.classList.remove("hidden");
            inGame = true;
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!inGame) return;
            ctx.fillStyle = "#020208";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Basit oyuncu çizimi
            ctx.fillStyle = "#00f2ff";
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("touchstart", () => {
            if(inGame) player.y -= 50; // Basit atlama
        });
        
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    </script>
</body>
</html>
