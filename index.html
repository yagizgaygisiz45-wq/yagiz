<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yağız'ın Oyun Stüdyosu</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 2px solid #00ff41; }
        .hero h1 { font-size: 3rem; color: #00ff41; text-shadow: 0 0 15px #00ff41; }
        .section-title { text-align: center; padding: 30px; font-size: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .btn { background: #00ff41; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; border-radius: 4px; }
        footer { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>

<section class="hero">
    <h1>YAĞIZ'IN STÜDYOSU</h1>
    <p>Mobil oyun geliştirme ve dijital üretim merkezi.</p>
</section>

<h2 class="section-title">Projelerim</h2>
<div class="grid">
    <div class="card">
        <h3>Geometry Dash</h3>
        <p>Süper Optimize Pro Edition v3.0</p>
        <a href="#" class="btn">Oyna</a>
    </div>
</div>

<section style="padding: 40px; text-align: center;">
    <h2>Hakkımda</h2>
    <p>Acode ve Web teknolojileri kullanarak kendi oyun dünyamı inşa ediyorum.</p>
</section>

<footer>
    <p>© 2026 Yağız | Tüm hakları saklıdır.</p>
</footer>

</body>
</html>
