<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yağız Stüdyo | Portfolio</title>
    <style>
        :root { --neon: #00ff41; --dark: #050505; }
        body { background-color: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Neon Animasyonları */
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .neon-text { animation: flicker 2s infinite; text-shadow: 0 0 10px var(--neon); }

        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        header { text-align: center; padding: 60px 20px; border-bottom: 1px solid #222; }
        h1 { font-size: 3rem; color: var(--neon); margin: 0; }

        /* Düzenli Izgara */
        .coming-soon { 
            padding: 50px; 
            border: 2px dashed #333; 
            text-align: center; 
            border-radius: 15px;
            background: linear-gradient(145deg, #0a0a0a, #050505);
        }

        .stats { display: flex; justify-content: space-around; padding: 40px; border-top: 1px solid #222; }
        .stat-item { text-align: center; }
        .stat-item h3 { color: var(--neon); margin: 0; }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #444; }
    </style>
</head>
<body>

<header>
    <h1 class="neon-text">YAĞIZ STÜDYO</h1>
    <p>Dijital oyun geliştirme ve inovasyon alanı.</p>
</header>

<div class="container">
    <div class="coming-soon">
        <h2>🛠️ Geliştirme Aşamasında</h2>
        <p>Yeni projeler ve büyük güncellemeler üzerinde çalışıyorum.</p>
        <p>Gelecek oyunlar için beklemede kal!</p>
    </div>

    <div class="stats">
        <div class="stat-item"><h3>0</h3><p>Aktif Proje</p></div>
        <div class="stat-item"><h3>100%</h3><p>Kod Kalitesi</p></div>
        <div class="stat-item"><h3>Beta</h3><p>Durum</p>
    </div>
</div>

<footer>
    <p>Yağız © 2026 | Modern Web Tasarımı</p>
</footer>

</body>
</html>
